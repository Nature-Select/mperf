name: release

on:
  push:
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag this run as (e.g. v0.1.0)'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        # Intel Mac dropped: macos-13 runners are now in 30min+ queues
        # as GitHub winds down Intel hosts post-Apple Silicon. Intel
        # users (a shrinking minority post-2020) can build from source.
        include:
          - os: macos-latest
            triple: aarch64-apple-darwin
            label: macOS arm64
          - os: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
            label: Linux x64
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
            label: Windows x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Catch a tag↔version mismatch before a 20-minute cross-build
      # turns into a wrong-version release. Compares the tag (without
      # the `v` prefix) against the workspace.package.version in
      # Cargo.toml — that's the version `env!("CARGO_PKG_VERSION")`
      # picks up for the in-app About panel. Skipped on
      # workflow_dispatch since manual runs are intentionally untagged.
      - name: Verify tag matches Cargo workspace version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          cargo_version=$(awk '
            /^\[workspace\.package\]/ { in_section=1; next }
            /^\[/ { in_section=0 }
            in_section && /^version[[:space:]]*=/ {
              sub(/^[^"]*"/, ""); sub(/".*$/, ""); print; exit
            }
          ' Cargo.toml)
          echo "tag        = $tag"
          echo "Cargo.toml = $cargo_version"
          if [ "$tag" != "$cargo_version" ]; then
            echo "::error::tag v$tag does not match Cargo workspace version $cargo_version — run \`pnpm bump $tag\` and re-tag"
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.triple }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libusbmuxd-dev

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Fetch adb sidecar
        run: pnpm fetch:adb

      - name: Tauri build
        run: pnpm tauri build --target ${{ matrix.triple }}

      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          find target/${{ matrix.triple }}/release/bundle \
            \( -name '*.dmg' -o -name '*.app.tar.gz' \) -exec cp {} artifacts/ \;

      - name: Collect artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          find target/${{ matrix.triple }}/release/bundle \
            \( -name '*.deb' -o -name '*.AppImage' -o -name '*.rpm' \) -exec cp {} artifacts/ \;

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p artifacts
          find target/${{ matrix.triple }}/release/bundle \
            \( -name '*.msi' -o -name '*.exe' \) -exec cp {} artifacts/ \;

      - uses: actions/upload-artifact@v4
        with:
          name: mperf-${{ matrix.triple }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten
        run: |
          mkdir -p release
          find dist -mindepth 2 -type f -exec mv {} release/ \;
          ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
